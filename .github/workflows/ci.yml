name: CI

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      RUN_MONITORING_TESTS: false
      RUN_E2E: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python deps (for tests & migrations)
        run: |
          python -m pip install --upgrade pip
          pip install -r services/api/requirements.txt
          pip install alembic
          pip install -r services/worker/requirements.txt

      - name: Prepare .env
        run: |
          cp .env.example .env
          cat .env

      - name: Start local services via Docker Compose
        run: |
          docker compose up --build -d

      - name: Wait for Postgres to be ready
        run: |
          set -eux
          for i in $(seq 1 30); do
            python - <<PY && break || true
import psycopg2, sys
try:
    psycopg2.connect(dbname="${POSTGRES_DB:-autointern}", user="${POSTGRES_USER:-autointern}", password="${POSTGRES_PASSWORD:-change-me}", host="localhost", port=${POSTGRES_PORT:-5432}).close()
    print("db ready")
    sys.exit(0)
except Exception as e:
    print("db not ready", e)
    sys.exit(1)
PY
            sleep 2
          done

      - name: Run Alembic migrations
        working-directory: services/api
        run: |
          alembic -c alembic.ini upgrade head

      - name: Run tests
        run: |
          pytest -q

      - name: E2E tests (Cypress)
        if: env.RUN_E2E == 'true'
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4
          - name: Setup Node
            uses: actions/setup-node@v3
            with:
              node-version: 20
          - name: Install frontend deps
            run: |
              cd frontend/admin
              npm ci
          - name: Push DLQ test payload
            run: |
              python scripts/push_dlq.py --payload '{"job": {"source":"e2e","external_id":"e2e-1","title":"E2E Job"}}'
          - name: Run Cypress tests
            run: |
              cd frontend/admin
              npx cypress run --config baseUrl=http://localhost:8080 --spec "cypress/e2e/admin_dlq.spec.js"

      - name: Monitoring smoke test (optional)
        if: env.RUN_MONITORING_TESTS == 'true'
        run: |
          # Wait for Alertmanager and alert-receiver to be available
          set -eux
          for i in $(seq 1 30); do
            python - <<PY && break || true
import requests
try:
    r = requests.get('http://alert-receiver:5001/health', timeout=2)
    if r.status_code == 200:
        print('alert-receiver ready')
        import sys
        sys.exit(0)
    else:
        print('alert-receiver not ready', r.status_code)
        sys.exit(1)
except Exception as e:
    print('not ready', e)
    sys.exit(1)
PY
            sleep 2
          done

          # Send a smoke test alert to Alertmanager
          python scripts/send_test_alert.py --alert CI_SmokeTest

          # Poll the alert-receiver for the alert arrival
          for i in $(seq 1 30); do
            python - <<PY && break || true
import requests, time, sys
try:
    r = requests.get('http://alert-receiver:5001/alerts?count=10', timeout=2)
    if r.status_code == 200:
        data = r.json()
        if any('CI_SmokeTest' in str(a) for a in data.get('alerts', [])):
            print('alert received by alert-receiver')
            sys.exit(0)
    print('not received yet')
    sys.exit(1)
except Exception as e:
    print('error', e)
    sys.exit(1)
PY
            sleep 2
          done

      - name: Lint (ruff)
        run: |
          python -m pip install ruff
          ruff check . || true

      - name: Teardown
        if: always()
        run: |
          docker compose down -v
