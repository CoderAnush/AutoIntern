name: CI

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python deps (for tests & migrations)
        run: |
          python -m pip install --upgrade pip
          pip install -r services/api/requirements.txt
          pip install alembic

      - name: Prepare .env
        run: |
          cp .env.example .env
          cat .env

      - name: Start local services via Docker Compose
        run: |
          docker compose up --build -d

      - name: Wait for Postgres to be ready
        run: |
          set -eux
          for i in $(seq 1 30); do
            python - <<PY && break || true
import psycopg2, sys
try:
    psycopg2.connect(dbname="${POSTGRES_DB:-autointern}", user="${POSTGRES_USER:-autointern}", password="${POSTGRES_PASSWORD:-change-me}", host="localhost", port=${POSTGRES_PORT:-5432}).close()
    print("db ready")
    sys.exit(0)
except Exception as e:
    print("db not ready", e)
    sys.exit(1)
PY
            sleep 2
          done

      - name: Run Alembic migrations
        working-directory: services/api
        run: |
          alembic -c alembic.ini upgrade head

      - name: Run tests
        run: |
          pytest -q

      - name: Lint (ruff)
        run: |
          python -m pip install ruff
          ruff check . || true

      - name: Teardown
        if: always()
        run: |
          docker compose down -v
