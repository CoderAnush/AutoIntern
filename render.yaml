services:
  - type: web
    name: autointern-api
    runtime: docker
    dockerfilePath: ./services/api/Dockerfile
    region: oregon

    # Health check configuration
    healthCheck:
      path: /health
      interval: 30
      timeout: 5
      startFailureThreshold: 4
      successThreshold: 1

    # Environment variables - MUST be set in Render dashboard
    envVars:
      - key: DATABASE_URL
        scope: run
        isFile: false
      - key: REDIS_URL
        scope: run
        isFile: false
      - key: SECRET_KEY
        scope: run
        isFile: false
      - key: ENVIRONMENT
        value: production
        scope: run
      - key: LOG_LEVEL
        value: info
        scope: run

    # Render automatically sets PORT environment variable
    # No need to modify command - Render handles it
    autoDeployOnPush: true
    branch: dev/init
