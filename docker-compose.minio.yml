# MinIO Docker Compose for Local Testing or Docker Deployment
version: '3.8'

services:
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: minio server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - autointern-network

volumes:
  minio_data:
    driver: local

networks:
  autointern-network:
    driver: bridge
