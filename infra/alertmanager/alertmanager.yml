route:
  receiver: 'default'
  group_by: ['alertname','job']
  group_wait: 10s
  group_interval: 1m
  repeat_interval: 1h

receivers:
  - name: 'default'
    # Default receiver is a webhook to the internal alert receiver (no secrets required)
    webhook_configs:
      - url: 'http://alert-receiver:5001/'
        send_resolved: true

  - name: 'slack'
    slack_configs:
      - api_url: 'file:///etc/alertmanager/secrets/slack_api_url'
        channel: '#alerts'
        username: 'autointern-alerts'
        send_resolved: true

  - name: 'email'
    email_configs:
      - to: 'oncall@example.com'
        from: 'alertmanager@example.com'
        smarthost: 'file:///etc/alertmanager/secrets/smtp_smarthost'
        auth_username: 'file:///etc/alertmanager/secrets/smtp_username'
        auth_identity: 'file:///etc/alertmanager/secrets/smtp_identity'
        send_resolved: true

  - name: 'telegram'
    webhook_configs:
      - url: 'file:///etc/alertmanager/secrets/telegram_webhook'
        send_resolved: true

# Routing based on severity label
routes:
  - match:
      severity: 'critical'
    receiver: 'slack'
    continue: true

  - match:
      severity: 'warning'
    receiver: 'email'
    continue: true

  - match_re:
      alertname: 'HighDLQSize|WorkerFailureSpike'
    receiver: 'default'
    continue: true
