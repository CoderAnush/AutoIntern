# Global defaults (apply to all sites)
defaults:
  timeout: 30
  connection_pool_size: 20

  # Anti-bot measures
  cloudflare_bypass: true
  proxy_rotation: false  # Set to true if you have proxy list
  user_agent_rotation: true

  # Redis configuration
  redis_host: "localhost"
  redis_port: 6379
  redis_queue: "ingest:jobs"

  # Data extraction
  fields:
    - title: "Job title"
    - company: "Hiring company"
    - location: "Work location"
    - description: "Job description"
    - url: "Direct job link"
    - salary_min: "Min salary (if available)"
    - salary_max: "Max salary (if available)"
    - job_type: "full-time/internship/contract"
    - source: "Source site name"
    - posted_date: "Date posted"
    - scraped_at: "When we scraped it"
